name: Modify or Remove a Resource ✏️
description: Request a correction, update, or removal of an existing resource on the Awesome List.
labels:
- modification-request
body:
- type: markdown
  attributes:
    value: |
      Thank you for helping keep the Awesome Snapmaker List accurate and up to date!
      
      Please provide the details below so a maintainer can review and apply the changes.
- type: dropdown
  id: request_type
  attributes:
    label: What do you want to do?
    options:
    - Update an existing resource (broken link, wrong tags, typo, etc.)
    - Remove a resource (no longer exists, inappropriate, obsolete)
  validations:
    required: true
- type: input
  id: current_link
  attributes:
    label: Current Resource Link
    description: Paste the "Content Link" of the resource currently on the website.
    placeholder: https://...
  validations:
    required: true
- type: input
  id: new_link
  attributes:
    label: New Resource Link (if applicable)
    description: If the resource moved to a new URL, paste the new link here. Leave blank if not applicable.
    placeholder: https://...
  validations:
    required: false
- type: textarea
  id: request_description
  attributes:
    label: Reason for Change / New Details
    description: Explain what needs to be changed (e.g. "The link is dead," or "Please change the cost to FREE and machine to Artisan").
    placeholder: Briefly explain the needed correction here...
  validations:
    required: true
