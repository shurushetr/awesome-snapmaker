name: 👉 Add a New Resource (EN)
description: Submit a new resource (tool, guide, mod, etc.) to the Awesome 
  Snapmaker List!
title: '[Submission] '
labels:
  - lang:en
  - new-submission
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to submit a new resource to the Awesome Snapmaker
        List!\n\nPlease fill out the form below. Once submitted, our automated bot
        will generate a Pull Request to add this to the database, so the maintainer
        can approve it with one click!\n\n"
  - type: textarea
    id: description
    attributes:
      label: Resource Description
      description: Provide a brief summary of what this resource is about.
      placeholder: This guide covers the best settings for...
    validations:
      required: true
  - type: input
    id: author_name
    attributes:
      label: Author Name
      description: Who created this resource? (Use your name or username if it's
        yours)
    validations:
      required: true
  - type: input
    id: author_link
    attributes:
      label: Author Link
      description: Link to the author's profile (GitHub, Thingiverse, Forum, 
        etc.)
    validations:
      required: true
  - type: input
    id: original_link
    attributes:
      label: Content Link (Original URL)
      description: Where is this resource hosted?
      placeholder: https://...
    validations:
      required: true
  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty Level
      options:
        - BEGINNER
        - INTERMEDIATE
        - ADVANCED
    validations:
      required: true
  - type: dropdown
    id: cost
    attributes:
      label: Cost
      options:
        - FREE
        - PAID
        - FREEMIUM
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Language
      description: What primary language is this resource in?
      options:
        - EN
        - ZH
        - DE
        - FR
        - ES
    validations:
      required: true
  - type: checkboxes
    id: machine_type
    attributes:
      label: Machine Type(s)
      description: Which Snapmaker machines does this apply to? (Select all that
        apply)
      options:
        - label: SM_2.0
        - label: ARTISAN
        - label: U1
        - label: J1/J1s
        - label: RAY
        - label: UNIVERSAL
  - type: checkboxes
    id: machine_tool_type
    attributes:
      label: Machine Tool Type(s)
      description: Which modules/toolheads are relevant? (Select all that apply)
      options:
        - label: FDM
        - label: LASER
        - label: CNC
        - label: ROTARY
        - label: COMBINED
  - type: checkboxes
    id: record_type
    attributes:
      label: Record Type(s)
      description: What kind of resource is this? (Select all that apply)
      options:
        - label: ARTICLE
        - label: CREATE
        - label: DISCUSSION
        - label: DOWNLOAD
        - label: FIRMWARE
        - label: MODS
        - label: ONLINE TOOL
        - label: REPAIR
        - label: SHOP
        - label: VIDEO
  - type: dropdown
    id: official_resource
    attributes:
      label: Official Snapmaker Resource?
      description: Is this an official Snapmaker resource or a community 
        creation?
      options:
        - "No"
        - "Yes"
    validations:
      required: true
  - type: input
    id: free_tags
    attributes:
      label: Free Tags
      description: Comma-separated tags (e.g. OFFICIAL, UNOFFICIAL, enclosure, 
        cooling)
      placeholder: UNOFFICIAL, cooling, petg
    validations:
      required: false
  - type: input
    id: extra_button_1_label
    attributes:
      label: (Optional) Extra Button 1 - Label
      description: Useful for direct PDF/STL downloads.
      placeholder: Download STL
    validations:
      required: false
  - type: input
    id: extra_button_1_link
    attributes:
      label: (Optional) Extra Button 1 - Link
      placeholder: https://...
    validations:
      required: false
  - type: markdown
    attributes:
      value: By submitting this issue, you confirm the link is safe and valid.
