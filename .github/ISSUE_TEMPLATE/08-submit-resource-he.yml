name: 👉 הוסף משאב חדש (HE)
description: הגש משאב חדש (כלי, מדריך, שינוי וכו') לרשימת Awesome Snapmaker!
labels:
  - lang:he
  - new-submission
body:
  - type: markdown
    attributes:
      value: "תודה שהקדשת את הזמן להגיש משאב חדש לרשימת Awesome Snapmaker!\n\nאנא
        מלא את הטופס למטה. לאחר ההגשה, הבוט האוטומטי שלנו ייצור Pull Request להוספתו
        לבסיס הנתונים, כך שהמתחזק יוכל לאשר זאת בלחיצה אחת!\n\n"
  - type: textarea
    id: description
    attributes:
      label: תיאור המשאב
      description: ספק סיכום קצר של מה שמשאב זה עוסק בו.
      placeholder: מדריך זה מכסה את ההגדרות הטובות ביותר עבור…
    validations:
      required: true
  - type: input
    id: author_name
    attributes:
      label: שם המחבר
      description: מי יצר את המשאב הזה? (השתמש בשמך או בשם המשתמש שלך אם זה שלך)
    validations:
      required: true
  - type: input
    id: author_link
    attributes:
      label: קישור למחבר
      description: קישור לפרופיל המחבר (GitHub, Thingiverse, פורום וכו')
    validations:
      required: true
  - type: input
    id: original_link
    attributes:
      label: קישור לתוכן (URL מקורי)
      description: היכן מתארח משאב זה?
      placeholder: https://...
    validations:
      required: true
  - type: dropdown
    id: difficulty
    attributes:
      label: רמת קושי
      options:
        - מתחיל
        - בינוני
        - מתקדם
    validations:
      required: true
  - type: dropdown
    id: cost
    attributes:
      label: עלות
      options:
        - חינמי
        - בתשלום
        - פרימיום חלקי
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: שפה
      description: באיזו שפה עיקרית כתוב המשאב הזה?
      options:
        - AR
        - DA
        - DE
        - EN
        - ES
        - FR
        - HE
        - IT
        - PL
        - RU
        - ZH-CN
        - ZH-HK
        - EN-PIRATE
      default: 6
    validations:
      required: true
  - type: checkboxes
    id: machine_type
    attributes:
      label: סוג מכונה
      description: לאילו מכונות Snapmaker זה רלוונטי? (בחר את כל המתאימים)
      options:
        - label: SM_2.0
        - label: ARTISAN
        - label: U1
        - label: J1/J1s
        - label: RAY
        - label: אוניברסלי
  - type: checkboxes
    id: machine_tool_type
    attributes:
      label: סוג כלי מכונה
      description: אילו מודולים/ראשי כלים רלוונטיים? (בחר את כל המתאימים)
      options:
        - label: FDM
        - label: לייזר
        - label: CNC
        - label: סיבובי
        - label: משולב
  - type: checkboxes
    id: record_type
    attributes:
      label: סוג רשומה
      description: מה סוג המשאב הזה? (בחר את כל המתאימים)
      options:
        - label: מאמר
        - label: יצירה
        - label: דיון
        - label: הורדה
        - label: קושחה
        - label: מודים
        - label: כלי מקוון
        - label: תיקון
        - label: חנות
        - label: וידאו
  - type: dropdown
    id: official_resource
    attributes:
      label: משאב רשמי של Snapmaker?
      description: האם זהו משאב רשמי של Snapmaker או יצירה קהילתית?
      options:
        - "לא"
        - "כן"
    validations:
      required: true
  - type: input
    id: free_tags
    attributes:
      label: תגים חופשיים
      description: תגים מופרדים בפסיקים (למשל OFFICIAL, UNOFFICIAL, enclosure, 
        cooling)
      placeholder: UNOFFICIAL, cooling, petg
    validations:
      required: false
  - type: input
    id: extra_button_1_label
    attributes:
      label: (אופציונלי) כפתור נוסף 1 - תווית
      description: שימושי להורדות ישירות של PDF/STL.
      placeholder: Download STL
    validations:
      required: false
  - type: input
    id: extra_button_1_link
    attributes:
      label: (אופציונלי) כפתור נוסף 1 - קישור
      placeholder: https://...
    validations:
      required: false
  - type: markdown
    attributes:
      value: על ידי הגשת נושא זה, אתה מאשר שהקישור בטוח ותקין.
