name: 👉 Добавить новый ресурс (RU)
description: Предложите новый ресурс (инструмент, руководство, мод и т.д.) для 
  Awesome Snapmaker List!
title: '[Submission] '
labels:
  - lang:ru
  - new-submission
body:
  - type: markdown
    attributes:
      value: "Спасибо, что нашли время предложить новый ресурс для Awesome Snapmaker
        List!\n\nПожалуйста, заполните форму ниже. После отправки наш бот автоматически
        создаст Pull Request для добавления в базу данных, чтобы модератор мог одобрить
        его одним кликом!\n\n"
  - type: textarea
    id: description
    attributes:
      label: Описание ресурса
      description: Кратко опишите, о чем этот ресурс.
      placeholder: Это руководство охватывает лучшие настройки для…
    validations:
      required: true
  - type: input
    id: author_name
    attributes:
      label: Имя автора
      description: Кто создал этот ресурс? (Используйте свое имя или никнейм, 
        если автор — вы)
    validations:
      required: true
  - type: input
    id: author_link
    attributes:
      label: Ссылка на автора
      description: Ссылка на профиль автора (GitHub, Thingiverse, форум и т.д.)
    validations:
      required: true
  - type: input
    id: original_link
    attributes:
      label: Ссылка на контент (Original URL)
      description: Где размещен этот ресурс?
      placeholder: https://...
    validations:
      required: true
  - type: dropdown
    id: difficulty
    attributes:
      label: Уровень сложности
      options:
        - BEGINNER
        - INTERMEDIATE
        - ADVANCED
    validations:
      required: true
  - type: dropdown
    id: cost
    attributes:
      label: Стоимость
      options:
        - FREE
        - PAID
        - FREEMIUM
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Язык
      description: На каком языке этот ресурс?
      options:
        - EN
        - DE
        - ES
        - IT
        - PL
        - FR
        - HE
        - AR
        - DA
        - ZH-CN
        - ZH-HK
    validations:
      required: true
  - type: checkboxes
    id: machine_type
    attributes:
      label: Тип устройства (устройств)
      description: Для каких моделей Snapmaker это подходит? (Выберите все 
        подходящие)
      options:
        - label: SM_2.0
        - label: ARTISAN
        - label: U1
        - label: J1/J1s
        - label: RAY
        - label: UNIVERSAL
  - type: checkboxes
    id: machine_tool_type
    attributes:
      label: Тип модуля/инструмента
      description: Какие модули или головки задействованы? (Выберите все 
        подходящие)
      options:
        - label: FDM
        - label: LASER
        - label: CNC
        - label: ROTARY
        - label: COMBINED
  - type: checkboxes
    id: record_type
    attributes:
      label: Тип записи
      description: Что это за ресурс? (Выберите все подходящие)
      options:
        - label: ARTICLE
        - label: CREATE
        - label: DISCUSSION
        - label: DOWNLOAD
        - label: FIRMWARE
        - label: MODS
        - label: ONLINE TOOL
        - label: REPAIR
        - label: SHOP
        - label: VIDEO
  - type: dropdown
    id: official_resource
    attributes:
      label: Официальный ресурс Snapmaker?
      description: Это официальный ресурс от Snapmaker или творение сообщества?
      options:
        - "Нет"
        - "Да"
    validations:
      required: true
  - type: input
    id: free_tags
    attributes:
      label: Свободные теги
      description: 'Теги через запятую (например: OFFICIAL, UNOFFICIAL, enclosure,
        cooling)'
      placeholder: UNOFFICIAL, cooling, petg
    validations:
      required: false
  - type: input
    id: extra_button_1_label
    attributes:
      label: (Опционально) Доп. кнопка 1 — Текст
      description: Полезно для прямых ссылок на скачивание PDF/STL.
      placeholder: Download STL
    validations:
      required: false
  - type: input
    id: extra_button_1_link
    attributes:
      label: (Опционально) Доп. кнопка 1 — Ссылка
      placeholder: https://...
    validations:
      required: false
  - type: markdown
    attributes:
      value: Отправляя эту форму, вы подтверждаете, что ссылка безопасна и 
        корректна.
