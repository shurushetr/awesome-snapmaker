name: Handle Merged Submissions
on:
  pull_request:
    types: [closed]

permissions:
  issues: write

jobs:
  label-and-close:
    # Only run if the PR was actually merged (not just closed) AND it came from our accumulated branch
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'pending-automated-submissions'
    runs-on: ubuntu-latest
    steps:
      - name: Label and Close Original Issues
        uses: actions/github-script@v6
        with:
          script: |
            // Fetch all files modified in the merged PR to inspect the diff
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            
            const dataFile = files.find(f => f.filename === 'data.yml');
            const issueNumbers = new Set();
            
            // Parse the diff patch to find all the added records' issue numbers
            if (dataFile && dataFile.patch) {
              const lines = dataFile.patch.split('\n');
              for (const line of lines) {
                if (line.startsWith('+') && !line.startsWith('+++')) {
                  const match = line.match(/^\+\s*-\s*id:\s*.*?-(\d+)\s*'?"?\s*$/);
                  if (match && match[1]) {
                    issueNumbers.add(parseInt(match[1], 10));
                  }
                }
              }
            }
            
            console.log(`Found issues to close: ${Array.from(issueNumbers).join(', ')}`);
            
            // Loop through each issue found and close them all
            for (const issueNumber of issueNumbers) {
              try {
                // 1. Add 'merged' label
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['merged']
                });
                
                // 2. Ensure issue is closed
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed'
                });
                
                // 3. Leave a nice comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: 'The Pull Request for this submission has been successfully merged into the main directory. Thank you for your contribution to the Awesome Snapmaker List! 🎉'
                });
              } catch (error) {
                console.log(`Failed to process issue #${issueNumber}: ${error.message}`);
              }
            }
