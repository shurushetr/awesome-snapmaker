# .github/workflows/deploy-pages.yml
#
# GitHub Action Workflow for building and deploying the Awesome Snapmaker List to GitHub Pages.
# It runs python scripts to generate the README, Issue Templates, and Localized HTML shells,
# commits persistent assets (templates, README) back to the repo, and deploys the rest (HTML, ephemeral assets) to Pages.
#
name: Build and Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          npm install js-yaml
          pip install ruamel.yaml

      - name: Generate README
        run: python .github/scripts/generate_readme.py

      - name: Generate Issue Templates
        run: python .github/scripts/generate_issue_templates.py

      - name: Run SEO Injection Script
        run: node .github/scripts/generate_og_tags.js

      - name: Commit and Push Persistent Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A README.md .github/ISSUE_TEMPLATE index.html
          git commit -m "chore: Auto-generate assets (README, Templates, SEO)" || exit 0
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break || sleep 5
          done

      - name: Generate Ephemeral Localized Pages
        run: python .github/scripts/generate_localized_pages.py

      - name: Generate Ephemeral Open Graph Redirects
        run: python .github/scripts/generate_record_pages.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
