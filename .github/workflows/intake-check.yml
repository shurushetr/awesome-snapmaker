name: "[Triage] Intake Check"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage-check:
    runs-on: ubuntu-latest
    # Only run if the issue body contains our form identifiers
    if: contains(github.event.issue.body, '### Content Link') || contains(github.event.issue.body, '### Author Link')
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install ruamel.yaml

      - name: Process Intake Automatically
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/intake_check.py
