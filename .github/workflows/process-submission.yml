name: Process New Submission
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: process-submission
  cancel-in-progress: false

jobs:
  process-issue:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'approved' && contains(github.event.issue.labels.*.name, 'new-submission')
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install ruamel.yaml
  
      - name: Process All Approved Issues
        id: process_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/process_issue.py

      - name: Prep PR Body
        if: env.ISSUES_PROCESSED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # pr_body.txt is already generated by the python script containing all the Closes #XXX lines
          # We just need to prepend the header
          cat pr_body.txt > temp.txt
          echo -e "This PR automatically accumulates approved records to avoid merge conflicts.\nWhen you merge this, all pending records will be added to \`data.yml\`.\n\nLatest additions:\n\n$(cat temp.txt)" > pr_body.txt
          rm temp.txt

      - name: Create Pull Request
        if: env.ISSUES_PROCESSED == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Add approved resources"
          title: "🚀 Pending Automated Records"
          body-path: pr_body.txt
          branch: "pending-automated-submissions"
          base: "main"
          delete-branch: true
      - name: Remove labels on original issues
        uses: actions/github-script@v6
        if: always()
        with:
          script: |
            // This is handled completely inside python now, so we can just leave this empty
            console.log("Labels and comments are handled natively by the Sweeper python script now.")
