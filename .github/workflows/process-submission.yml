name: Process New Submission
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: process-submission
  cancel-in-progress: false

jobs:
  process-issue:
    runs-on: ubuntu-latest
    # Run only if the 'approved' label was just added
    if: github.event.label.name == 'approved'
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and checkout existing PR branch
        run: |
          git fetch origin pending-automated-submissions:pending-automated-submissions || true
          git checkout pending-automated-submissions || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install ruamel.yaml
  
      - name: Process Issue Body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/process_issue.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Add resource: #${{ github.event.issue.number }}"
          title: "🚀 Pending Automated Records"
          body: |
            This PR automatically accumulates approved records to avoid merge conflicts.
            When you merge this, all pending records will be added to `data.yml`.
            
            Latest addition from issue #${{ github.event.issue.number }}.
          branch: "pending-automated-submissions"
          base: "main"
          delete-branch: true
          
      - name: Comment and Cleanup Labels
        uses: actions/github-script@v6
        with:
          script: |
            // Comment on the issue
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Thanks for your submission! A Pull Request has been automatically created to add your resource into the database.`
            });
            // Try removing the pending-review label
            try {
              github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'pending-review'
              });
            } catch (error) {
              console.log("No pending-review label found to remove.");
            }
