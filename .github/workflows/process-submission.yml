name: Process New Submission
on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-issue:
    runs-on: ubuntu-latest
    # Only run if issue has 'new-submission' label
    if: contains(github.event.issue.labels.*.name, 'new-submission')
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Process Issue Body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/process_issue.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Add generic new submission from Issue #${{ github.event.issue.number }}"
          title: "🚀 New Record: ${{ github.event.issue.title }}"
          body: |
            Automatically generated PR from issue #${{ github.event.issue.number }}.
            Please review the YAML changes before approving.
          branch: "add-record-issue-${{ github.event.issue.number }}"
          delete-branch: true
          
      - name: Comment on Issue
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks for your submission! A Pull Request has been automatically created to add your resource into the database. A maintainer will check it soon.
