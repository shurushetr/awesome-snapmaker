name: Process New Submission
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

# Removed concurrency group to prevent GitHub from dropping intermediate jobs
# when multiple issues are approved simultaneously. Race conditions during git push
# are mitigated by git pull --rebase or try loops, but first let's just remove the cap.
jobs:
  process-issue:
    runs-on: ubuntu-latest
    # Run only if the 'approved' label was just added and it comes from the issue template
    if: github.event.label.name == 'approved' && contains(github.event.issue.labels.*.name, 'new-submission')
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and checkout existing PR branch
        run: |
          git fetch origin main:main || true
          git fetch origin pending-automated-submissions:pending-automated-submissions || true
          git checkout pending-automated-submissions || git checkout -b pending-automated-submissions

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install ruamel.yaml
  
      - name: Process Issue Body
        id: process_issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/process_issue.py

      - name: Prep PR Body
        if: steps.process_issue.outputs.is_duplicate != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo -e "This PR automatically accumulates approved records to avoid merge conflicts.\nWhen you merge this, all pending records will be added to \`data.yml\`.\n\nLatest addition from issue #${{ github.event.issue.number }}.\n\nCloses #${{ github.event.issue.number }}" > pr_body.txt
          
          if gh pr view pending-automated-submissions --repo ${{ github.repository }} > /dev/null 2>&1; then
            gh pr view pending-automated-submissions --repo ${{ github.repository }} --json body -q .body > pr_body.txt
            if ! grep -q "Closes #${{ github.event.issue.number }}" pr_body.txt; then
              echo "Closes #${{ github.event.issue.number }}" >> pr_body.txt
            fi
          fi

      - name: Create Pull Request with Retry
        if: steps.process_issue.outputs.is_duplicate != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Commit the changes
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.yml
          git commit -m "Add resource: #${{ github.event.issue.number }}" || {
            echo "No changes to commit (possibly an identical duplicate that slipped through)."
            exit 0
          }
          
          # Retry loop for pushing to the shared branch to handle race conditions
          max_retries=10
          retry_count=0
          until git push --set-upstream origin pending-automated-submissions; do
            retry_count=$((retry_count+1))
            if [ $retry_count -ge $max_retries ]; then
              echo "Failed to push after $max_retries attempts."
              exit 1
            fi
            echo "Push failed due to conflict, rebasing..."
            # Random sleep to desync parallel runners
            sleep $((RANDOM % 5 + 1))
            git fetch origin pending-automated-submissions
            
            # Use ours to ensure new records just get appended during rebase conflicts
            # Since data.yml is just appended to, git should handle auto-merges, but giving it a strategy helps
            git rebase -Xours origin/pending-automated-submissions || {
              echo "Rebase conflict! Aborting and retrying with manual append."
              git rebase --abort
              # If git fails to merge the append, we fallback to just re-running the python script
              python .github/scripts/process_issue.py
              git add data.yml
              git commit --amend --no-edit
            }
          done
          
          # Create or update the PR body
          # First try to see if PR exists. If it does, we edit it to append this issue to body.
          if gh pr view pending-automated-submissions >/dev/null 2>&1; then
            echo "PR exists, editing it..."
            gh pr edit pending-automated-submissions --body-file pr_body.txt
          else
            echo "PR does not exist. Creating..."
            gh pr create --title "🚀 Pending Automated Records" \
                         --body-file pr_body.txt \
                         --base main \
                         --head pending-automated-submissions || \
            gh pr edit pending-automated-submissions --body-file pr_body.txt
          fi
      - name: Comment and Cleanup Labels
        uses: actions/github-script@v6
        env:
          IS_DUPLICATE: ${{ steps.process_issue.outputs.is_duplicate }}
        with:
          script: |
            const isDuplicate = process.env.IS_DUPLICATE === 'true';
            
            if (isDuplicate) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `This resource has already been submitted and exists in the database. Closing as duplicate.`
              });
              
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['duplicate']
              });
              
              await github.rest.issues.update({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed'
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `Thanks for your submission! A Pull Request has been automatically created to add your resource into the database.`
              });
            }
            
            // Try removing the pending-content-review label
            try {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'pending-content-review'
              });
            } catch (error) {
              console.log("No pending-content-review label found to remove.");
            }
