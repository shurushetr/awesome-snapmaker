name: Process New Submission
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: process-submission
  cancel-in-progress: false

jobs:
  process-issue:
    runs-on: ubuntu-latest
    # Run only if the 'approved' label was just added and it comes from the issue template
    if: github.event.label.name == 'approved' && contains(github.event.issue.labels.*.name, 'new-submission')
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and checkout existing PR branch
        run: |
          git fetch origin pending-automated-submissions:pending-automated-submissions || true
          git checkout pending-automated-submissions || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install ruamel.yaml
  
      - name: Process Issue Body
        id: process_issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/process_issue.py

      - name: Prep PR Body
        if: steps.process_issue.outputs.is_duplicate != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo -e "This PR automatically accumulates approved records to avoid merge conflicts.\nWhen you merge this, all pending records will be added to \`data.yml\`.\n\nLatest addition from issue #${{ github.event.issue.number }}.\n\nCloses #${{ github.event.issue.number }}" > pr_body.txt
          
          if gh pr view pending-automated-submissions --repo ${{ github.repository }} > /dev/null 2>&1; then
            gh pr view pending-automated-submissions --repo ${{ github.repository }} --json body -q .body > pr_body.txt
            if ! grep -q "Closes #${{ github.event.issue.number }}" pr_body.txt; then
              echo "Closes #${{ github.event.issue.number }}" >> pr_body.txt
            fi
          fi

      - name: Create Pull Request
        if: steps.process_issue.outputs.is_duplicate != 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Add resource: #${{ github.event.issue.number }}"
          title: "🚀 Pending Automated Records"
          body-path: pr_body.txt
          branch: "pending-automated-submissions"
          base: "main"
          delete-branch: true
          
      - name: Comment and Cleanup Labels
        uses: actions/github-script@v6
        env:
          IS_DUPLICATE: ${{ steps.process_issue.outputs.is_duplicate }}
        with:
          script: |
            const isDuplicate = process.env.IS_DUPLICATE === 'true';
            
            if (isDuplicate) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `This resource has already been submitted and exists in the database. Closing as duplicate.`
              });
              
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['duplicate']
              });
              
              await github.rest.issues.update({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed'
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `Thanks for your submission! A Pull Request has been automatically created to add your resource into the database.`
              });
            }
            
            // Try removing the pending-content-review label
            try {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'pending-content-review'
              });
            } catch (error) {
              console.log("No pending-content-review label found to remove.");
            }
