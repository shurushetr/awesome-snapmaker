name: Process New Submission
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-issue:
    runs-on: ubuntu-latest
    # Run only if the 'approved' label was just added
    if: github.event.label.name == 'approved'
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml
  
      - name: Process Issue Body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python .github/scripts/process_issue.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Add generic new submission from Issue #${{ github.event.issue.number }}"
          title: "🚀 New Record: ${{ github.event.issue.title }}"
          body: |
            Automatically generated PR from issue #${{ github.event.issue.number }}.
            Please review the YAML changes before approving.
          branch: "add-record-issue-${{ github.event.issue.number }}"
          delete-branch: true
          
      - name: Comment and Cleanup Labels
        uses: actions/github-script@v6
        with:
          script: |
            // Comment on the issue
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Thanks for your submission! A Pull Request has been automatically created to add your resource into the database.`
            });
            // Try removing the pending-review label
            try {
              github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'pending-review'
              });
            } catch (error) {
              console.log("No pending-review label found to remove.");
            }
