    |\n| 5 | PINK 🩷| USB_ID | A11 | B11 |\n| 6 | BLACK ⬛| GND | A1, A12 | B1,B12 |\n\
    | 7 | BLUE 🟦| GND | A1,A12 | B1,B12 |\n| 8 | WHITE ⬜| SC_RxD | A2 | B2 |\n| 9
    | GREEN 🟩| SC_TxD | A3 | B3 |\n| 10 | YELLOW 🟨| SC_DET | A10 | B10 |\n| 11 | PURPLE
