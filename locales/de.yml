tour_btn_next: Weiter →
tour_btn_prev: ← Zurück
tour_btn_done: Verstanden!
tour_step1_title: Willkommen bei der Awesome Snapmaker List!
tour_step1_desc: Machen wir einen kurzen Rundgang, um zu lernen, wie Sie einfach
  filtern und genau das finden, was Sie brauchen.
tour_step2_title: Fuzzy-Suche
tour_step2_desc: Suchen Sie eine spezielle Firmware? Versuchen Sie, hier 
  'PAXX12' einzugeben. Die Fuzzy-Suche findet sofort die besten Treffer!
tour_step3_title: Nach Maschine filtern
tour_step3_desc: Leeren Sie nun das Suchfeld und lassen Sie uns dieselbe 
  PAXX12-Firmware stattdessen mithilfe von Tags finden. Klicken Sie zuerst auf 
  das Maschinen-Tag 'U1'.
tour_step4_title: Nach Typ filtern
tour_step4_desc: Sie können Filter kombinieren! Klicken Sie nun auf 'FIRMWARE', 
  um U1-Firmware-Updates zu finden.
tour_step5_title: Ausschlussfilterung
tour_step5_desc: Sie können auf Tags doppelklicken, um sie rot zu färben und 
  sofort aus Ihren Ergebnissen AUSZUSCHLIESSEN. Doppelklicken Sie auf andere 
  Maschinen-Tags, um diese auszuschließen, und scrollen Sie dann nach unten, um 
  den PAXX12-Eintrag zu sehen!
tour_step6_title: Favoriten speichern
tour_step6_desc: Klicken Sie auf den ★ bei einer Ressource, um sie sicher auf 
  Ihrem Gerät zu speichern. Klicken Sie dann hier oben auf '★ Favoriten 
  anzeigen', um Ihre Liste auf die gespeicherten Einträge zu filtern.
tour_step7_title: Ansichten teilen
tour_step7_desc: Haben Sie das perfekte Setup gefunden? Klicken Sie auf 'Ansicht
  teilen', um Ihre genauen Filter als Link zu kopieren.
tour_step8_title: Links teilen
tour_step8_desc: Sie können auch das Link-Symbol auf einzelnen Karten verwenden,
  um eine bestimmte Ressource direkt zu teilen.
tour_step2b_title: "Instant Results"
tour_step2b_desc: "The list updates instantly, showing exactly how many records match."
tour_step2c_title: "Match Found"
tour_step2c_desc: "Here is the exact PAXX12 firmware we're looking for, highlighted
  among the results!"
tour_step5b_title: "Finding with Tags"
tour_step5b_desc: "By combining inclusions and exclusions, we've filtered the entire
  list down to the exact same PAXX12 firmware record without typing!"
tour_step6b_title: "View Favorites"
tour_step6b_desc: "Then, click '★ Show Favorites' up here to filter the entire list
  down to just your saved items."
