tour_btn_next: Onwarrd →
tour_btn_prev: ← Retreat
tour_btn_done: Arr, got it!
tour_step1_title: Welcome aboard the Awesome Snapmaker List!
tour_step1_desc: Let's take a quick sail to learn how to easily filter and spy 
  exactly what ye be needin'.
tour_step2_title: Fuzzy Searchin'
tour_step2_desc: Lookin' fer specialized firmware? Try tyin' 'PAXX12' here. The 
  fuzzy search will instantly find the closest matches in the seven seas!
tour_step3_title: Filter by Vessel
tour_step3_desc: Now clear the search box, and let's find that same PAXX12 
  firmware usin' flags instead. First, click the 'U1' machine flag.
tour_step4_title: Filter by Type
tour_step4_desc: Ye can combine filters! Now click 'FIRMWARE' to find U1 
  firmware updates.
tour_step5_title: Exclusion Filterin'
tour_step5_desc: Ye can double-click tags to turn 'em red and instantly BANISH 
  'em from yer results. Double-click other machine flags to exclude 'em, then 
  scroll down to spy the PAXX12 treasure!
tour_step6_title: Save Ye Favorites
tour_step6_desc: Click the ★ on any booty to securely stash it on yer local 
  ship. Then, click '★ Show Favorites' up 'ere to filter the entire list down to
  just yer saved plunder.
tour_step7_title: Share Yer Spyglass
tour_step7_desc: Found the perfect coordinates? Click 'Share View' to copy yer 
  exact filters as a map link.
tour_step8_title: Share Map Links
tour_step8_desc: Ye can also use the link icon on individual cards to directly 
  share a specific chest of gold.
tour_step2b_title: Instant Rewarrds
tour_step2b_desc: The manifest shifts like the tides, showin the exact tally 
  souls or spoils the moment they’re spotted!
tour_step2c_title: Target Sighted!
tour_step2c_desc: Behold! The PAXX12 cipher shines like a gold doubloon amidst 
  the dross—the very key to the vessel's heart be right here!
tour_step5b_title: Huntin' by the Markings
tour_step5b_desc: By keepin' the gold and heavin' the stones to the deep, we’ve 
  boiled the whole manifest down to the PAXX12 cipher—all without dippin' a 
  single nib in the ink!
tour_step6b_title: Prize Jewels!
tour_step6b_desc: Now, strike the '★ Star of the Sea' aloft! It’ll scuttle the 
  chaff and leave naught but your prized plunder in plain sight!
tour_step9_title: Scour the Hull
tour_step9_desc: Scuttle the lot! Strike the 'Purge the Fog' mark to bring the 
  whole fleet back into sight. Now, go forth and pillage the manifest to your 
  heart's content!
