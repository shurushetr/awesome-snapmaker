# locales/en.yml
# 
# This is the primary monolingual base translation file for the Awesome Snapmaker List codebase.
# It contains all the English static UI strings, bot comments, and Issue Template variables.
# Codeberg Translate (Weblate) uses this file as the structural template when generating other language files.
#
# --- WEBLATE SETUP REMINDER ---
# To prevent Weblate from throwing translation warnings on strings with heavy formatting
# (like URLs, newlines, or markdown), navigate to Component -> Settings -> Translation flags
# and paste the following regular expressions into the configuration box:
#
# ^bot_.*: md-text
# ^issue_.*_body: md-text
# ------------------------------
#
# --- AI / LLM TRANSLATOR INSTRUCTIONS ---
# If you are an AI translating this file into a new language:
# 1. ONLY translate the string values. DO NOT translate the YAML keys (e.g. keep `ui_title:` exactly as is).
# 2. DO translate the values of tags (like record types, difficulty, cost) into local equivalents.
# 3. DO NOT translate the names of Machine models (e.g. SM_2.0, Artisan, J1/J1s, Ray) as they are proper nouns, EXCEPT for "Universal" which can be translated.
# 4. PRESERVE all Markdown syntax (like **, [], and () parentheses for links).
# 5. PRESERVE all HTML tags exactly as they appear (like <strong> and <span style="...">).
# 6. PRESERVE all newline characters (\n) exactly where they appear.
# 7. Ensure all translated values remain wrapped in double quotes ("").
# 8. PRESERVE the original Camel Case formatting wherever it is applied to technical terms.
# 9. TONE AND STYLE: Translate in a friendly, engaging, and conversational tone suitable for a maker/3D-printing community. Avoid overly formal or corporate language. Use natural, idiomatic expressions specific to the target language rather than literal word-for-word translations, to minimize the need for human correction.
# ----------------------------------------


