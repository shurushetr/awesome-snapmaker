# locales/en.yml
# 
# This is the primary monolingual base translation file for the Awesome Snapmaker List codebase.
# It contains all the English static UI strings, bot comments, and Issue Template variables.
# Codeberg Translate (Weblate) uses this file as the structural template when generating other language files.
#
# --- WEBLATE SETUP REMINDER ---
# To prevent Weblate from throwing translation warnings on strings with heavy formatting
# (like URLs, newlines, or markdown), navigate to Component -> Settings -> Translation flags
# and paste the following regular expressions into the configuration box:
#
# ^bot_.*: md-text
# ^issue_.*_body: md-text
# ------------------------------
#
# --- AI / LLM TRANSLATOR INSTRUCTIONS ---
# If you are an AI translating this file into a new language:
# 1. ONLY translate the string values. DO NOT translate the YAML keys (e.g. keep `ui_title:` exactly as is).
# 2. DO NOT translate the names of GitHub tags (e.g. OFFICIAL, UNOFFICIAL, enclosure).
# 3. PRESERVE all Markdown syntax (like **, [], and () parentheses for links).
# 4. PRESERVE all HTML tags exactly as they appear (like <strong> and <span style="...">).
# 5. PRESERVE all newline characters (\n) exactly where they appear.
# 6. Ensure all translated values remain wrapped in double quotes ("").
# ----------------------------------------


