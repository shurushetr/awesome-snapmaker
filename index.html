<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Snapmaker</title>
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- JS Dependencies (from CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    
    <!-- Auto-Generated Open Graph Meta Tags -->
    <meta property="og:title" content="Awesome Snapmaker List">
    <meta property="og:description" content="A curated list of awesome Snapmaker resources, mods, and guides. Currently tracking 133 awesome mods, tools, and guides.">
    <meta property="og:image" content="https://github.com/shurushetr/awesome-snapmaker/raw/main/images/hero_img.webp">
    <meta property="og:url" content="https://github.com/shurushetr/awesome-snapmaker">
    <meta property="og:type" content="website">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Awesome Snapmaker List">
    <meta name="twitter:description" content="A curated list of awesome Snapmaker resources, mods, and guides. Currently tracking 133 awesome mods, tools, and guides.">
    <meta name="twitter:image" content="https://github.com/shurushetr/awesome-snapmaker/raw/main/images/hero_img.webp">
    <!-- End Auto-Generated Meta Tags -->
</head>

<body>

    <!-- Header Section -->
    <header id="site-header" class="header">
        <div class="header-content">
            <h1 id="site-title">Loading...</h1>
            <p id="site-description"></p>
            <div class="header-links">
                <a id="author-link" href="#" target="_blank" rel="noopener noreferrer">Contact Author</a>
                <a id="repo-link" href="#" target="_blank" rel="noopener noreferrer">Contribute on GitHub</a>
            </div>
            <div class="header-actions">
                <a href="https://github.com/shurushetr/awesome-snapmaker.xyz/issues/new/choose"
                    class="btn primary-btn submit-btn" target="_blank" rel="noopener noreferrer">Submit a New Item</a>
                <button id="theme-toggle" class="btn secondary-btn submit-btn theme-btn"
                    aria-label="Toggle Dark Mode">🌓</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Controls: Search & Filters -->
        <section class="controls" aria-label="Search and filter controls">
            <div class="search-bar">
                <input type="search" id="search-input" placeholder="Search the awesome list using description, title, tags..."
                    aria-label="Search items">
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label for="sort-select">Sort By:</label>
                    <select id="sort-select">
                        <option value="newest">Newest Added First</option>
                        <option value="oldest">Oldest Added First</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="limit-input">Show count limit:</label>
                    <input type="number" id="limit-input" min="1" placeholder="All (e.g. 5)"
                        aria-label="Limit number of results"
                        style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--card-border); background-color: var(--bg-color); color: var(--text-color); width: 150px;">
                </div>

                <div class="filter-group">
                    <label>Filter by Machine:</label>
                    <div id="filter-machine" class="tag-filters">
                        <!-- Checkboxes generated by JS -->
                    </div>
                </div>

                <div class="filter-group">
                    <label>Filter by Tool:</label>
                    <div id="filter-tool" class="tag-filters">
                        <!-- Checkboxes generated by JS -->
                    </div>
                </div>

                <div class="filter-group">
                    <label>Filter by Type:</label>
                    <div id="filter-type" class="tag-filters">
                        <!-- Checkboxes generated by JS -->
                    </div>
                </div>

                <div class="filter-group">
                    <label>Filter by Official:</label>
                    <div id="filter-official" class="tag-filters">
                        <!-- Checkboxes generated by JS -->
                    </div>
                </div>

                <div class="filter-group">
                    <label>Filter by Difficulty:</label>
                    <div id="filter-difficulty" class="tag-filters">
                        <!-- Checkboxes generated by JS -->
                    </div>
                </div>

                <div class="filter-group">
                    <label>Filter by Cost:</label>
                    <div id="filter-cost" class="tag-filters">
                        <!-- Checkboxes generated by JS -->
                    </div>
                </div>

                <div class="filter-actions">
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="show-favorites" class="btn secondary-btn" data-active="false" style="color: #f59e0b; font-weight: bold;">★ Show Favorites</button>
                        <button id="clear-filters" class="btn secondary-btn">Clear All Filters</button>
                    </div>
                    <span id="result-count" class="result-count">0 items found</span>
                </div>
            </div>
        </section>

        <!-- Dynamic Records Container -->
        <section id="records-container" class="records-grid" aria-live="polite">
            <!-- Cards generated by JS -->
        </section>
    </main>

    <!-- Floating Action Button -->
    <button id="jump-top" aria-label="Jump to top of page" title="Jump to top">↑</button>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>

</html>
